<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Sign Up — MyHealth Reminder</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app">
  <div class="auth-screen">

    <div class="auth-logo">
      <div class="auth-logo-ico">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="5" width="15" height="3" rx="1.5" fill="currentColor"/>
          <rect x="2" y="11" width="20" height="3" rx="1.5" fill="currentColor"/>
          <rect x="2" y="17" width="12" height="3" rx="1.5" fill="currentColor"/>
          <circle cx="21" cy="18.5" r="5" stroke="currentColor" stroke-width="2.2"/>
          <path d="M19.5 18.5L21 20L23 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="auth-app-nm">MyHealth Reminder</span>
    </div>

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Start your wellness journey today.</p>

    <div class="auth-form">

      <div class="form-group">
        <label class="form-lbl">Full Name</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <input class="form-input" id="fName" type="text" placeholder="e.g. Mary Angel Grana" autocomplete="name"/>
        </div>
        <p class="err-msg" id="nameErr">Please enter your full name.</p>
      </div>

      <div class="form-group">
        <label class="form-lbl">Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M2 8l10 6 10-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <input class="form-input" id="fEmail" type="email" inputmode="email" placeholder="you@email.com" autocomplete="email"/>
        </div>
        <p class="err-msg" id="emailErr">Please enter a valid email.</p>
      </div>

      <div class="form-group">
        <label class="form-lbl">Password</label>
        <div class="pw-wrap">
          <input class="form-input" id="fPass" type="password" placeholder="At least 6 characters" autocomplete="new-password" style="padding-right:46px"/>
          <button class="pw-tog" id="pwTog1" type="button">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
        <div class="str-bar"><div class="str-fill" id="strFill"></div></div>
        <p class="str-txt" id="strTxt" style="color:var(--muted)"></p>
        <p class="err-msg" id="passErr">Password must be at least 6 characters.</p>
      </div>

      <div class="form-group">
        <label class="form-lbl">Confirm Password</label>
        <div class="pw-wrap">
          <input class="form-input" id="fPass2" type="password" placeholder="Re-enter password" autocomplete="new-password" style="padding-right:46px"/>
          <button class="pw-tog" id="pwTog2" type="button">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
        <p class="err-msg" id="pass2Err">Passwords do not match.</p>
      </div>

      <button class="btn-primary" id="signupBtn">Create Account</button>

      <div class="auth-foot">
        Already have an account? <a id="goLogin">Sign In</a>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  if (MH.auth.isLoggedIn()) { window.location.href = 'dashboard.html'; }

  document.getElementById('goLogin').onclick = function () { MH.go('login.html'); };

  /* Password toggles */
  document.getElementById('pwTog1').onclick = function () {
    var i = document.getElementById('fPass');
    i.type = i.type === 'password' ? 'text' : 'password';
  };
  document.getElementById('pwTog2').onclick = function () {
    var i = document.getElementById('fPass2');
    i.type = i.type === 'password' ? 'text' : 'password';
  };

  /* Strength meter */
  document.getElementById('fPass').oninput = function () {
    var v = this.value;
    var s = 0;
    if (v.length >= 6)          s++;
    if (v.length >= 10)         s++;
    if (/[A-Z]/.test(v))        s++;
    if (/[0-9]/.test(v))        s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    var labels = ['','Weak','Fair','Good','Strong','Very strong'];
    var colors = ['','#F87171','#FBBF24','#60A5FA','#4ADE80','#4ADE80'];
    document.getElementById('strFill').style.width      = (s / 5 * 100) + '%';
    document.getElementById('strFill').style.background = colors[s] || '';
    document.getElementById('strTxt').textContent       = v ? labels[s] : '';
    document.getElementById('strTxt').style.color       = colors[s] || 'var(--muted)';
  };

  function doSignup() {
    var name  = document.getElementById('fName').value.trim();
    var email = document.getElementById('fEmail').value.trim();
    var pass  = document.getElementById('fPass').value;
    var pass2 = document.getElementById('fPass2').value;

    var errIds = ['nameErr','emailErr','passErr','pass2Err'];
    for (var ei = 0; ei < errIds.length; ei++) { document.getElementById(errIds[ei]).classList.remove('show'); }

    var ok = true;
    if (!name)                         { document.getElementById('nameErr').classList.add('show');  ok = false; }
    if (!email || email.indexOf('@') === -1) { document.getElementById('emailErr').classList.add('show'); ok = false; }
    if (pass.length < 6)               { document.getElementById('passErr').classList.add('show');  ok = false; }
    if (pass !== pass2)                { document.getElementById('pass2Err').classList.add('show'); ok = false; }
    if (!ok) return;

    var res = MH.auth.register(name, email, pass);
    if (!res.ok) {
      document.getElementById('emailErr').textContent = res.msg;
      document.getElementById('emailErr').classList.add('show');
      return;
    }
    MH.toast('Welcome, ' + name.split(' ')[0] + '! Account created.');
    setTimeout(function () { window.location.href = 'dashboard.html'; }, 600);
  }

  document.getElementById('signupBtn').onclick = function (e) {
    MH.ripple(e.currentTarget, e);
    doSignup();
  };

  var inputIds = ['fName','fEmail','fPass','fPass2'];
  for (var ii = 0; ii < inputIds.length; ii++) {
    (function(inputId){
      document.getElementById(inputId).onkeydown = function(e){ if(e.key==='Enter') doSignup(); };
    }(inputIds[ii]));
  }
</script>
</body>
</html>
