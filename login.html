<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Login — MyHealth Reminder</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app">
  <div class="auth-screen">

    <div class="auth-logo">
      <div class="auth-logo-ico">
        <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="5" width="15" height="3" rx="1.5" fill="currentColor"/>
          <rect x="2" y="11" width="20" height="3" rx="1.5" fill="currentColor"/>
          <rect x="2" y="17" width="12" height="3" rx="1.5" fill="currentColor"/>
          <circle cx="21" cy="18.5" r="5" stroke="currentColor" stroke-width="2.2"/>
          <path d="M19.5 18.5L21 20L23 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="auth-app-nm">MyHealth Reminder</span>
    </div>

    <h1 class="auth-title">Welcome back!</h1>
    <p class="auth-sub">Sign in to continue your wellness journey.</p>

    <div class="auth-form">
      <div class="form-group">
        <label class="form-lbl">Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M2 8l10 6 10-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <input class="form-input" id="fEmail" type="email" inputmode="email" placeholder="you@email.com" autocomplete="email"/>
        </div>
        <p class="err-msg" id="emailErr">Please enter a valid email.</p>
      </div>

      <div class="form-group">
        <label class="form-lbl">Password</label>
        <div class="pw-wrap">
          <input class="form-input" id="fPass" type="password" placeholder="Your password" autocomplete="current-password" style="padding-right:46px"/>
          <button class="pw-tog" id="pwTog" type="button">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
        <p class="err-msg" id="passErr">Incorrect email or password.</p>
      </div>

      <div style="margin-top:4px">
        <button class="btn-primary" id="loginBtn">Sign In</button>
      </div>

      <div class="divider">or</div>

      <button class="btn-outline" id="goSignup">Create an Account</button>

      <div class="auth-foot" style="margin-top:14px">
        <a id="goBack">← Back to Welcome</a>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  /* Redirect if already logged in */
  if (MH.auth.isLoggedIn()) { window.location.href = 'dashboard.html'; }

  /* Password toggle */
  document.getElementById('pwTog').onclick = function () {
    var inp = document.getElementById('fPass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };

  /* Navigation */
  document.getElementById('goSignup').onclick = function () { MH.go('signup.html'); };
  document.getElementById('goBack').onclick    = function () { MH.go('index.html'); };

  /* Login */
  function doLogin() {
    var email = document.getElementById('fEmail').value.trim();
    var pass  = document.getElementById('fPass').value;
    var eErr  = document.getElementById('emailErr');
    var pErr  = document.getElementById('passErr');
    eErr.classList.remove('show');
    pErr.classList.remove('show');

    var ok = true;
    if (!email || email.indexOf('@') === -1) { eErr.classList.add('show'); ok = false; }
    if (!pass) {
      pErr.textContent = 'Password is required.';
      pErr.classList.add('show'); ok = false;
    }
    if (!ok) return;

    var res = MH.auth.login(email, pass);
    if (!res.ok) {
      pErr.textContent = res.msg;
      pErr.classList.add('show');
      return;
    }
    MH.toast('Welcome back, ' + res.user.name.split(' ')[0] + '!');
    setTimeout(function () { window.location.href = 'dashboard.html'; }, 500);
  }

  document.getElementById('loginBtn').onclick = function (e) {
    MH.ripple(e.currentTarget, e);
    doLogin();
  };

  /* Enter key */
  document.getElementById('fEmail').onkeydown = function (e) { if (e.key === 'Enter') doLogin(); };
  document.getElementById('fPass').onkeydown  = function (e) { if (e.key === 'Enter') doLogin(); };
</script>
</body>
</html>
